name: Browser Official Source

on:
  workflow_dispatch:
  schedule:
    - cron: '30 23 * * 0'

jobs:
  browser-official:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser official source gate
        run: npm run ci:browser-official
