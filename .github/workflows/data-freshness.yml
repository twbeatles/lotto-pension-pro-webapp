name: Data Freshness

on:
  workflow_dispatch:
  schedule:
    - cron: '20 22 * * *'

jobs:
  data-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check strict Lotto freshness
        run: npm run check:data-freshness:strict

      - name: Check Lotto official latest draw
        run: npm run check:lotto:official

      - name: Check Pension720 official freshness
        run: npm run check:pension720:freshness

      - name: Release gate
        run: npm run build:release
